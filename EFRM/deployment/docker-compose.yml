version: "3.9"

# ── EFRM Full-Stack Docker Compose ──────────────────────────────────────────
# Services: SQL Server · Redis · Zookeeper · Kafka · EFRM API · Angular UI
# ---------------------------------------------------------------------------

networks:
  efrm-net:
    driver: bridge

volumes:
  sqlserver-data:
  redis-data:
  kafka-data:

services:

  # ─── SQL Server 2022 ──────────────────────────────────────────────────────
  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: efrm-sqlserver
    environment:
      SA_PASSWORD: "Efrm@2026!Secure"
      ACCEPT_EULA: "Y"
      MSSQL_PID:   "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
      - ./init:/docker-entrypoint-initdb.d
    networks: [efrm-net]
    healthcheck:
      test: ["/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Efrm@2026!Secure", "-Q", "SELECT 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ─── Redis 7 Cluster ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: efrm-redis
    command: redis-server --requirepass Efrm@Redis2026 --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks: [efrm-net]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "Efrm@Redis2026", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Zookeeper (Kafka dependency) ─────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: efrm-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    networks: [efrm-net]

  # ─── Apache Kafka ─────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: efrm-kafka
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS:             PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        "true"
      KAFKA_LOG_RETENTION_HOURS:              168   # 7 days
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks: [efrm-net]
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── Kafka UI (dev only) ──────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: efrm-kafka-ui
    depends_on: [kafka]
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME:            EFRM-Kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks: [efrm-net]
    profiles: [dev]

  # ─── EFRM Backend API ─────────────────────────────────────────────────────
  efrm-api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: efrm-api
    depends_on:
      sql-server: { condition: service_healthy }
      redis:      { condition: service_healthy }
      kafka:      { condition: service_healthy }
    ports:
      - "5000:80"
      - "5001:443"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__EFRM:  "Server=sql-server;Database=EFRMDB;User Id=sa;Password=Efrm@2026!Secure;TrustServerCertificate=true;"
      ConnectionStrings__Redis: "redis:6379,password=Efrm@Redis2026"
      Jwt__Key:      "EFRM-UPGB-SuperSecretKey-ChangeInProd-2026!@#$"
      Jwt__Issuer:   "EFRM-UPGB"
      Jwt__Audience: "EFRM-Users"
      Cors__AllowedOrigins: "http://localhost:4200,https://efrm.upgb.in"
      Kafka__BootstrapServers: "kafka:9092"
    networks: [efrm-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── Angular Frontend (Nginx) ─────────────────────────────────────────────
  efrm-ui:
    build:
      context: ../frontend/efrm-ui
      dockerfile: Dockerfile
    container_name: efrm-ui
    depends_on: [efrm-api]
    ports:
      - "80:80"
      - "443:443"
    networks: [efrm-net]
    restart: unless-stopped
