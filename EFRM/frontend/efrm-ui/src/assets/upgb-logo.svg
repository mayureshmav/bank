<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 44" width="192" height="44">
  <!-- Shield icon -->
  <g transform="translate(2, 2)">
    <!-- Shield body -->
    <path d="M20 0 L38 5 L38 18 C38 29 30 37 20 40 C10 37 2 29 2 18 L2 5 Z"
          fill="#1a237e"/>
    <!-- Shield highlight -->
    <path d="M20 3 L35 7 L35 18 C35 28 28 35 20 38 C12 35 5 28 5 18 L5 7 Z"
          fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

    <!-- Bank building inside shield -->
    <!-- Roof / pediment -->
    <polygon points="20,10 28,15 12,15" fill="white" opacity="0.95"/>
    <!-- 3 columns -->
    <rect x="12.5" y="15" width="3" height="10" rx="0.5" fill="white" opacity="0.9"/>
    <rect x="18.5" y="15" width="3" height="10" rx="0.5" fill="white" opacity="0.9"/>
    <rect x="24.5" y="15" width="3" height="10" rx="0.5" fill="white" opacity="0.9"/>
    <!-- Base / steps -->
    <rect x="11" y="25" width="18" height="2.5" rx="0.5" fill="white" opacity="0.9"/>
    <rect x="10" y="27.5" width="20" height="1.5" rx="0.5" fill="white" opacity="0.7"/>

    <!-- Orange accent scan-line (fraud detection) -->
    <line x1="8" y1="20.5" x2="32" y2="20.5"
          stroke="#FF8F00" stroke-width="1.5" stroke-linecap="round" opacity="0.85"/>
    <!-- Scan dot -->
    <circle cx="24" cy="20.5" r="2" fill="#FF8F00" opacity="0.9"/>
  </g>

  <!-- Text: UPGB -->
  <text x="48" y="26"
        font-family="Roboto, Arial, sans-serif"
        font-size="20" font-weight="700" letter-spacing="1"
        fill="white">UPGB</text>

  <!-- Text: EFRM PLATFORM -->
  <text x="49" y="38"
        font-family="Roboto, Arial, sans-serif"
        font-size="9" font-weight="400" letter-spacing="2"
        fill="rgba(255,255,255,0.65)">EFRM PLATFORM</text>
</svg>
